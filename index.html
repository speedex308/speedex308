<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Speedex308 — форум скорости</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #020205; color: #d7dadc; min-height: 100vh; display: flex; justify-content: center; padding: 0; position: relative; overflow-x: hidden; }
    .speed-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
    .speed-line-bg { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, #00ffcc, #ff00ff, #00ffcc, transparent); animation: lineShoot linear infinite; filter: blur(1px); }
    @keyframes lineShoot { 0% { transform: translateX(-100%) scaleY(0.5); opacity: 0; } 15% { opacity: 1; transform: translateX(5vw) scaleY(1.5); } 85% { opacity: 0.8; transform: translateX(95vw) scaleY(0.8); } 100% { transform: translateX(110vw) scaleY(0.3); opacity: 0; } }
    .particle { position: absolute; border-radius: 50%; animation: particleFloat linear infinite; }
    @keyframes particleFloat { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    .app-container { position: relative; z-index: 10; display: flex; gap: 1.5rem; max-width: 1100px; width: 100%; margin: 1.5rem; align-items: flex-start; }
    .sidebar { width: 260px; background: rgba(10,10,20,0.9); border: 1px solid rgba(0,255,200,0.2); border-radius: 16px; padding: 1rem; position: sticky; top: 1.5rem; flex-shrink: 0; display: flex; flex-direction: column; gap: 0.8rem; backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(0,255,200,0.1), inset 0 0 40px rgba(0,255,200,0.03); animation: sidebarGlow 3s ease-in-out infinite; }
    @keyframes sidebarGlow { 0%,100% { box-shadow: 0 0 40px rgba(0,255,200,0.1), inset 0 0 40px rgba(0,255,200,0.03); } 50% { box-shadow: 0 0 60px rgba(255,0,255,0.15), inset 0 0 60px rgba(0,255,200,0.06); } }
    .sidebar-header { display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(0,255,200,0.2); }
    .sidebar-logo { font-size: 2rem; animation: logoSpin 4s linear infinite; }
    @keyframes logoSpin { 0% { transform: rotate(0deg); filter: drop-shadow(0 0 8px #00ffcc); } 50% { transform: rotate(180deg); filter: drop-shadow(0 0 20px #ff00ff); } 100% { transform: rotate(360deg); filter: drop-shadow(0 0 8px #00ffcc); } }
    .sidebar-title { font-weight: 900; font-size: 1.4rem; background: linear-gradient(135deg, #00ffcc, #ff00ff, #00ffcc); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: titleShine 3s ease infinite; }
    @keyframes titleShine { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .sidebar-nav { display: flex; flex-direction: column; gap: 0.3rem; }
    .sidebar-link { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.8rem; border-radius: 8px; color: #818384; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .sidebar-link::before { content: ''; position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,200,0.1), transparent); transition: left 0.5s; }
    .sidebar-link:hover::before { left: 100%; }
    .sidebar-link:hover { background: rgba(0,255,200,0.08); color: #00ffcc; transform: translateX(6px); box-shadow: 0 0 20px rgba(0,255,200,0.2); }
    .sidebar-link.active { background: rgba(0,255,200,0.12); color: #00ffcc; font-weight: 700; box-shadow: 0 0 25px rgba(0,255,200,0.3); animation: activePulse 2s infinite; }
    @keyframes activePulse { 0%,100% { box-shadow: 0 0 25px rgba(0,255,200,0.3); } 50% { box-shadow: 0 0 40px rgba(255,0,255,0.4); } }
    .sidebar-link i { width: 20px; text-align: center; transition: transform 0.3s; }
    .sidebar-link:hover i { transform: rotate(15deg) scale(1.2); }
    .user-section { border-top: 1px solid rgba(0,255,200,0.2); padding-top: 0.8rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .user-info { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #00ffcc, #ff00ff); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; animation: avatarPulse 2s infinite; }
    @keyframes avatarPulse { 0%,100% { box-shadow: 0 0 10px #00ffcc; } 50% { box-shadow: 0 0 25px #ff00ff; } }
    .user-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
    .karma-badge { font-size: 0.7rem; background: linear-gradient(135deg, #00ffcc, #00ccaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
    .sidebar-footer { margin-top: auto; font-size: 0.7rem; color: #818384; text-align: center; padding-top: 0.5rem; }
    .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.8rem; }
    .search-bar { background: rgba(10,10,20,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 12px; padding: 0.5rem 1rem; display: flex; gap: 0.5rem; backdrop-filter: blur(10px); animation: fadeInUp 0.5s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .search-input { flex: 1; background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 20px; padding: 0.5rem 1rem; color: #d7dadc; font-size: 0.9rem; outline: none; transition: all 0.3s; }
    .search-input:focus { border-color: #00ffcc; box-shadow: 0 0 25px rgba(0,255,200,0.3); }
    .filter-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .filter-tag { background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 16px; padding: 0.3rem 0.7rem; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; color: #818384; }
    .filter-tag:hover { border-color: #00ffcc; color: #00ffcc; }
    .filter-tag.active-tag { background: #00ffcc; color: #000; font-weight: 700; border-color: #00ffcc; }
    .create-post-btn { background: rgba(10,10,20,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 12px; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); animation: fadeInUp 0.5s ease 0.1s both; }
    .create-post-btn:hover { border-color: #00ffcc; box-shadow: 0 0 35px rgba(0,255,200,0.25); transform: translateY(-3px); }
    .create-placeholder { flex: 1; background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.15); border-radius: 8px; padding: 0.6rem 1rem; color: #818384; font-size: 0.9rem; }
    .sort-bar { background: rgba(10,10,20,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 12px; padding: 0.5rem 1rem; display: flex; gap: 0.5rem; align-items: center; backdrop-filter: blur(10px); }
    .sort-btn { background: none; border: none; color: #818384; font-weight: 600; font-size: 0.85rem; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: all 0.3s; }
    .sort-btn:hover { background: rgba(0,255,200,0.1); color: #d7dadc; }
    .sort-btn.active-sort { background: linear-gradient(135deg, #00ffcc, #00ccaa); color: #000; font-weight: 700; box-shadow: 0 0 20px rgba(0,255,200,0.4); }
    .posts-list { display: flex; flex-direction: column; gap: 0.7rem; min-height: 200px; }
    .post-card { background: rgba(10,10,20,0.8); border: 1px solid rgba(0,255,200,0.15); border-radius: 12px; display: flex; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); cursor: pointer; backdrop-filter: blur(10px); animation: cardAppear 0.5s ease both; position: relative; overflow: hidden; }
    .post-card:hover { border-color: #00ffcc; box-shadow: 0 0 40px rgba(0,255,200,0.2), 0 10px 30px rgba(0,0,0,0.5); transform: translateY(-4px) scale(1.01); }
    @keyframes cardAppear { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    .vote-column { display: flex; flex-direction: column; align-items: center; padding: 0.6rem 0.5rem; background: rgba(0,0,0,0.3); border-radius: 12px 0 0 12px; gap: 0.2rem; min-width: 40px; z-index: 5; }
    .vote-btn { background: none; border: none; color: #818384; cursor: pointer; font-size: 1.3rem; padding: 0.2rem; transition: all 0.3s; line-height: 1; pointer-events: auto; }
    .vote-btn:hover { color: #00ffcc; transform: scale(1.3); filter: drop-shadow(0 0 8px #00ffcc); }
    .vote-btn.upvoted { color: #00ffcc; filter: drop-shadow(0 0 10px #00ffcc); animation: votePop 0.4s ease; }
    .vote-btn.downvoted { color: #ff4466; filter: drop-shadow(0 0 10px #ff4466); animation: votePop 0.4s ease; }
    @keyframes votePop { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }
    .vote-count { font-weight: 700; font-size: 0.85rem; color: #d7dadc; pointer-events: none; }
    .post-content { padding: 0.7rem 1rem; flex: 1; min-width: 0; }
    .post-header { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: #818384; margin-bottom: 0.3rem; flex-wrap: wrap; }
    .post-author { font-weight: 700; color: #00ffcc; cursor: pointer; transition: all 0.3s; }
    .tag-badge { background: rgba(0,255,200,0.15); color: #00ffcc; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 6px; }
    .voice-badge { background: rgba(255,0,255,0.15); color: #ff00ff; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 6px; cursor: pointer; }
    .nsfw-badge { background: #ff4466; color: white; font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 3px; animation: nsfwBlink 1.5s infinite; }
    @keyframes nsfwBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .post-title-link { font-size: 1.1rem; font-weight: 600; color: #d7dadc; display: block; margin-bottom: 0.3rem; word-break: break-word; transition: color 0.3s; }
    .post-body-preview { color: #9a9da0; font-size: 0.9rem; line-height: 1.4; max-height: 80px; overflow: hidden; white-space: pre-wrap; word-break: break-word; }
    .post-image-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 0.5rem; object-fit: cover; }
    .post-actions { display: flex; gap: 1.2rem; margin-top: 0.4rem; align-items: center; }
    .post-action-btn { background: none; border: none; color: #818384; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.5rem; border-radius: 6px; transition: all 0.3s; pointer-events: auto; }
    .post-action-btn:hover { background: rgba(0,255,200,0.1); color: #00ffcc; }
    .save-post-btn { background: none; border: none; color: #818384; cursor: pointer; font-size: 1.2rem; transition: all 0.3s; pointer-events: auto; }
    .save-post-btn:hover { color: #00ffcc; transform: scale(1.3); }
    .save-post-btn.saved { color: #00ffcc; filter: drop-shadow(0 0 8px #00ffcc); animation: savePop 0.4s ease; }
    @keyframes savePop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; align-items: center; padding: 1rem; }
    .page-btn { background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); color: #d7dadc; padding: 0.4rem 0.8rem; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .page-btn:hover { background: #00ffcc; color: #000; }
    .page-btn.active { background: #00ffcc; color: #000; font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 2rem; color: #818384; }
    .loading-state { text-align: center; padding: 2rem; } .loading-state i { animation: spin 1s linear infinite; font-size: 2rem; color: #00ffcc; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s; backdrop-filter: blur(5px); }
    .modal { background: rgba(10,10,20,0.95); border: 1px solid rgba(0,255,200,0.3); border-radius: 16px; width: 90%; max-width: 750px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,255,200,0.2); animation: modalSlide 0.4s ease; }
    @keyframes modalSlide { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-header { padding: 1rem; border-bottom: 1px solid rgba(0,255,200,0.2); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-weight: 700; font-size: 1.1rem; color: #00ffcc; }
    .close-btn { background: none; border: none; color: #818384; font-size: 1.5rem; cursor: pointer; padding: 0.3rem; transition: all 0.3s; }
    .close-btn:hover { color: #ff4466; transform: rotate(90deg); }
    .modal-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; flex: 1; overflow-y: auto; }
    .input-field { background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 8px; padding: 0.7rem; color: #d7dadc; font-size: 0.9rem; outline: none; font-family: inherit; transition: all 0.3s; }
    .input-field:focus { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0,255,200,0.3); }
    .textarea-field { background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); border-radius: 8px; padding: 0.7rem; color: #d7dadc; font-size: 0.9rem; outline: none; resize: vertical; min-height: 120px; font-family: inherit; transition: all 0.3s; }
    .textarea-field:focus { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0,255,200,0.3); }
    .voice-record-section { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; background: rgba(255,0,255,0.05); border: 1px solid rgba(255,0,255,0.2); border-radius: 8px; }
    .record-btn { background: #ff4466; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; user-select: none; }
    .record-btn:active { background: #ff0000; box-shadow: 0 0 25px rgba(255,68,102,0.5); transform: scale(0.95); }
    .record-btn.recording { animation: recordPulse 1s infinite; background: #ff0000; }
    @keyframes recordPulse { 0%,100% { box-shadow: 0 0 10px #ff0000; } 50% { box-shadow: 0 0 30px #ff0000; } }
    .voice-player { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
    .voice-player audio { flex: 1; height: 32px; }
    .image-upload-area { border: 2px dashed rgba(0,255,200,0.3); border-radius: 8px; padding: 1.5rem; text-align: center; color: #818384; cursor: pointer; transition: all 0.3s; }
    .image-upload-area:hover { border-color: #00ffcc; box-shadow: 0 0 25px rgba(0,255,200,0.2); }
    .image-upload-area.has-image { border-color: #00ffcc; padding: 0.5rem; }
    .image-upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; }
    .submit-btn { background: linear-gradient(135deg, #00ffcc, #00ccaa); border: none; color: #000; font-weight: 700; padding: 0.7rem; border-radius: 12px; cursor: pointer; font-size: 0.9rem; width: 100%; transition: all 0.3s; }
    .submit-btn:hover { box-shadow: 0 0 35px rgba(0,255,200,0.5); transform: translateY(-2px); }
    .submit-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    .post-full-view { padding: 1rem; }
    .post-full-body { color: #d7dadc; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; margin: 1rem 0; }
    .post-full-image { max-width: 100%; border-radius: 8px; margin: 1rem 0; box-shadow: 0 0 30px rgba(0,255,200,0.2); }
    .post-full-voice { margin: 1rem 0; }
    .post-full-voice audio { width: 100%; }
    .comments-section { border-top: 1px solid rgba(0,255,200,0.2); padding-top: 1rem; margin-top: 1rem; }
    .comment { padding: 0.5rem 0; border-left: 2px solid rgba(0,255,200,0.3); padding-left: 0.8rem; animation: commentSlide 0.4s ease; }
    @keyframes commentSlide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .comment.reply { margin-left: 1.5rem; border-left-color: rgba(255,0,255,0.4); }
    .comment-author { font-size: 0.75rem; font-weight: 600; color: #00ffcc; }
    .comment-text { color: #d7dadc; font-size: 0.9rem; }
    .comment-voice { margin: 0.3rem 0; }
    .comment-voice audio { height: 24px; width: 100%; }
    .comment-actions { display: flex; gap: 0.8rem; margin-top: 0.2rem; }
    .comment-action-btn { background: none; border: none; color: #818384; font-size: 0.7rem; cursor: pointer; transition: all 0.3s; }
    .comment-action-btn:hover { color: #00ffcc; transform: scale(1.1); }
    .comment-input-row { display: flex; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid rgba(0,255,200,0.2); }
    .delete-post-btn { background: #ff4466; color: #fff; border: none; padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.7rem; transition: all 0.3s; }
    .delete-post-btn:hover { background: #ff2244; box-shadow: 0 0 20px rgba(255,68,102,0.5); }
    .report-btn { background: none; border: none; color: #ffaa00; cursor: pointer; font-size: 0.7rem; }
    .report-btn:hover { color: #ff8800; }
    .settings-group { display: flex; flex-direction: column; gap: 1rem; }
    .settings-group label { font-weight: 600; font-size: 0.9rem; color: #d7dadc; }
    .settings-group select { background: rgba(20,20,40,0.8); border: 1px solid rgba(0,255,200,0.2); color: #d7dadc; padding: 0.5rem; border-radius: 8px; }
    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (max-width: 750px) {
      .app-container { flex-direction: column; margin: 0.5rem; }
      .sidebar { width: 100%; position: static; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="speed-bg" id="speedBg"></div>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header"><i class="fas fa-bolt sidebar-logo"></i><span class="sidebar-title">SPEEDEX308</span></div>
      <nav class="sidebar-nav">
        <div class="sidebar-link active" data-filter="all"><i class="fas fa-home"></i> Главная</div>
        <div class="sidebar-link" data-filter="popular"><i class="fas fa-fire"></i> Популярное</div>
        <div class="sidebar-link" data-filter="new"><i class="fas fa-clock"></i> Новое</div>
        <div class="sidebar-link" data-filter="top"><i class="fas fa-trophy"></i> Топ</div>
      </nav>
      <div class="sidebar-link" id="savedPostsBtn"><i class="fas fa-bookmark"></i> Сохранённые</div>
      <div class="sidebar-link" id="settingsSidebarBtn"><i class="fas fa-cog"></i> Настройки</div>
      <div class="user-section">
        <div class="user-info"><div class="user-avatar" id="sidebarAvatar">?</div><span class="user-name" id="sidebarUserName">Аноним</span><span class="karma-badge" id="sidebarKarma"></span></div>
        <input type="text" class="input-field" id="nicknameInput" placeholder="Ваш ник" style="text-align:center;font-size:0.8rem;padding:0.4rem;">
        <button class="submit-btn" id="saveNickBtn" style="font-size:0.8rem;padding:0.4rem;">Сохранить</button>
      </div>
      <div class="sidebar-footer">будьте вежливы</div>
    </aside>
    <main class="main-content">
      <div class="search-bar"><input type="text" class="search-input" id="searchInput" placeholder="Поиск..."><button class="submit-btn" id="searchBtn" style="width:auto;padding:0.5rem 1.2rem;">Поиск</button></div>
      <div class="filter-tags">
        <span class="filter-tag active-tag" data-tag="all">Все</span>
        <span class="filter-tag" data-tag="voice"><i class="fas fa-microphone"></i> Голосовые</span>
        <span class="filter-tag" data-tag="image"><i class="fas fa-image"></i> С фото</span>
        <span class="filter-tag" data-tag="text"><i class="fas fa-font"></i> Текст</span>
      </div>
      <div class="create-post-btn" id="openCreatePostBtn"><div class="create-placeholder">Создать пост...</div></div>
      <div class="sort-bar">
        <button class="sort-btn active-sort" data-sort="best"><i class="fas fa-rocket"></i> Лучшие</button>
        <button class="sort-btn" data-sort="new"><i class="fas fa-clock"></i> Новые</button>
        <button class="sort-btn" data-sort="top"><i class="fas fa-arrow-up"></i> Топ</button>
      </div>
      <div class="posts-list" id="postsList"><div class="loading-state"><i class="fas fa-spinner"></i></div></div>
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="createPostModal">
    <div class="modal"><div class="modal-header"><span class="modal-title">Создать пост</span><button class="close-btn" id="closeCreateModalBtn">&times;</button></div>
      <div class="modal-body">
        <input type="text" class="input-field" id="postTitleInput" placeholder="Заголовок">
        <textarea class="textarea-field" id="postBodyInput" placeholder="Текст поста"></textarea>
        <div class="voice-record-section">
          <button class="record-btn" id="recordVoiceBtn"><i class="fas fa-microphone"></i></button>
          <div class="voice-player" id="voicePlayerCreate"></div>
          <span style="font-size:0.7rem;color:#818384;" id="recordStatus">Зажмите для записи</span>
        </div>
        <div class="image-upload-area" id="imageUploadArea"><i class="fas fa-image"></i> Нажмите для фото<input type="file" accept="image/*" id="imageInput" hidden></div>
        <button class="submit-btn" id="submitPostBtn">Опубликовать</button>
      </div></div>
  </div>

  <div class="modal-overlay hidden" id="postViewModal">
    <div class="modal"><div class="modal-header"><span class="modal-title" id="postViewTitle"></span><button class="close-btn" id="closePostViewBtn">&times;</button></div><div class="modal-body" id="postViewContent"></div></div>
  </div>

  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal"><div class="modal-header"><span class="modal-title">Настройки</span><button class="close-btn" id="closeSettingsBtn">&times;</button></div>
      <div class="modal-body"><div class="settings-group"><label>Язык</label><select id="languageFilter"><option value="all">Все</option><option value="ru">Русский</option><option value="en">English</option></select><label>NSFW</label><select id="nsfwFilter"><option value="hide">Скрывать</option><option value="show">Показывать</option></select></div><button class="submit-btn" id="saveSettingsBtn">Сохранить</button></div></div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCsXiFkm8RMGGIccU5toClPyTZZQi25i84", authDomain: "speedex308-31200.firebaseapp.com", projectId: "speedex308-31200", storageBucket: "speedex308-31200.firebasestorage.app", messagingSenderId: "824640853758", appId: "1:824640853758:web:7d5736912bcfef3ba5b7af" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let posts = [], allPosts = [], nickname = 'Аноним', settings = { language: 'all', nsfw: 'hide' };
    let currentPostId = null, currentSort = 'best', currentFilter = 'all', currentTag = 'all';
    let pendingImage = null, pendingVoice = null, unsubscribe = null;
    let currentPage = 1, pageSize = 10, savedPosts = [];
    let userId = localStorage.getItem('sp308_uid') || ('u_' + Date.now() + Math.random().toString(36).substr(2,5));
    let mediaRecorder = null, audioChunks = [], isRecording = false, recordTimer = null;
    const NSFW = ['мат','сука','блядь','хуй','пизда','ебать','fuck','shit','ass','расчлененка','убийство','кровь','жестокость','насилие','порно','секс','интим','голый','nude','violence','gore'];

    function loadData() { localStorage.setItem('sp308_uid', userId); try { const n=localStorage.getItem('sp308_nick');if(n)nickname=n;const s=localStorage.getItem('sp308_settings');if(s)settings=JSON.parse(s);const sp=localStorage.getItem('sp308_saved');if(sp)savedPosts=JSON.parse(sp); } catch(e) {} }
    function saveAll() { localStorage.setItem('sp308_nick',nickname);localStorage.setItem('sp308_settings',JSON.stringify(settings));localStorage.setItem('sp308_saved',JSON.stringify(savedPosts)); }
    function detectLang(t){const ru=/[а-яё]/i.test(t),en=/[a-z]/i.test(t);if(ru&&!en)return'ru';if(en&&!ru)return'en';if(ru&&en)return'mixed';return'unknown';}
    function isNSFW(t){return NSFW.some(w=>t.toLowerCase().includes(w));}
    function updateUI() { document.getElementById('sidebarAvatar').textContent=nickname.charAt(0).toUpperCase();document.getElementById('sidebarUserName').textContent=nickname;document.getElementById('nicknameInput').value=nickname;const up=allPosts.filter(p=>p.authorId===userId);document.getElementById('sidebarKarma').textContent='⭐'+up.reduce((s,p)=>s+(p.votes||0),0); }
    document.getElementById('saveNickBtn').onclick=()=>{const n=document.getElementById('nicknameInput').value.trim();if(n){nickname=n;saveAll();updateUI();applyFiltersAndRender();}};

    // Запись голоса — зажать кнопку
    const recordBtn = document.getElementById('recordVoiceBtn');
    recordBtn.onmousedown = async (e) => { e.preventDefault();
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = () => {
            pendingVoice = reader.result;
            document.getElementById('voicePlayerCreate').innerHTML = `<audio controls src="${pendingVoice}"></audio>`;
            document.getElementById('recordStatus').textContent = 'Готово ✓';
          };
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
          isRecording = false; recordBtn.classList.remove('recording');
        };
        mediaRecorder.start(); isRecording = true;
        recordBtn.classList.add('recording'); document.getElementById('recordStatus').textContent = 'Запись...';
        clearTimeout(recordTimer);
        recordTimer = setTimeout(() => { if(isRecording) { mediaRecorder.stop(); } }, 60000);
      } catch(e) { alert('Нет доступа к микрофону'); }
    };
    recordBtn.onmouseup = (e) => { e.preventDefault(); if(isRecording) { mediaRecorder.stop(); } };
    recordBtn.onmouseleave = (e) => { if(isRecording) { mediaRecorder.stop(); } };
    recordBtn.ontouchstart = (e) => { e.preventDefault(); recordBtn.onmousedown(e); };
    recordBtn.ontouchend = (e) => { e.preventDefault(); if(isRecording) { mediaRecorder.stop(); } };

    function subscribeToPosts() { if(unsubscribe)unsubscribe();document.getElementById('postsList').innerHTML='<div class="loading-state"><i class="fas fa-spinner"></i></div>';unsubscribe=db.collection('posts').orderBy('createdAt','desc').onSnapshot(snap=>{allPosts=[];snap.forEach(doc=>allPosts.push({id:doc.id,...doc.data()}));updateUI();applyFiltersAndRender();},err=>{document.getElementById('postsList').innerHTML='<div class="empty-state">Ошибка</div>';}); }
    function applyFiltersAndRender() { let f=[...allPosts];const q=document.getElementById('searchInput').value.toLowerCase();if(q)f=f.filter(p=>p.title.toLowerCase().includes(q)||(p.body||'').toLowerCase().includes(q));
      if(currentTag==='voice')f=f.filter(p=>p.voice);else if(currentTag==='image')f=f.filter(p=>p.image);else if(currentTag==='text')f=f.filter(p=>!p.voice&&!p.image);
      if(currentFilter==='saved')f=f.filter(p=>savedPosts.includes(p.id));else{if(settings.language!=='all')f=f.filter(p=>{const l=detectLang(p.title+' '+p.body);return l===settings.language||l==='mixed';});if(settings.nsfw==='hide')f=f.filter(p=>!p.nsfw);const now=Date.now();if(currentFilter==='new')f.sort((a,b)=>b.createdAt-a.createdAt);else if(currentFilter==='popular')f.sort((a,b)=>(b.votes+(b.comments?b.comments.length:0)*2)-(a.votes+(a.comments?a.comments.length:0)*2));else if(currentFilter==='top')f.sort((a,b)=>b.votes-a.votes);if(currentSort==='new')f.sort((a,b)=>b.createdAt-a.createdAt);else if(currentSort==='top')f.sort((a,b)=>b.votes-a.votes);}posts=f;renderPage(); }
    function renderPage() { const tp=Math.ceil(posts.length/pageSize)||1;if(currentPage>tp)currentPage=tp;const s=(currentPage-1)*pageSize;const pp=posts.slice(s,s+pageSize);const l=document.getElementById('postsList');if(!pp.length){l.innerHTML='<div class="empty-state">Ничего нет</div>';}else{l.innerHTML='';pp.forEach(p=>{const uv=p.userVotes?.[userId]||0;const c=document.createElement('div');c.className='post-card';c.innerHTML=`<div class="vote-column"><button class="vote-btn ${uv===1?'upvoted':''}" data-id="${p.id}" data-v="up">▲</button><span class="vote-count">${p.votes||0}</span><button class="vote-btn ${uv===-1?'downvoted':''}" data-id="${p.id}" data-v="down">▼</button></div><div class="post-content" data-pid="${p.id}"><div class="post-header"><span class="post-author">u/${esc(p.authorName||'аноним')}</span> • ${ago(p.createdAt)}${p.voice?'<span class="voice-badge"><i class="fas fa-microphone"></i> голос</span>':''}${p.image?'<span class="tag-badge"><i class="fas fa-image"></i> фото</span>':''}${p.nsfw?'<span class="nsfw-badge">18+</span>':''}</div><span class="post-title-link">${esc(p.title)}</span>${p.body?`<div class="post-body-preview">${esc(p.body.substring(0,200))}</div>`:''}${p.image?`<img src="${p.image}" class="post-image-preview">`:''}<div class="post-actions"><button class="post-action-btn comm-btn" data-id="${p.id}"><i class="fas fa-comment-alt"></i> ${p.comments?p.comments.length:0}</button><button class="save-post-btn ${savedPosts.includes(p.id)?'saved':''}" data-id="${p.id}"><i class="fas fa-bookmark"></i></button>${p.reports>2?'<span style="color:#ffaa00;font-size:0.7rem;">⚠</span>':''}</div></div>`;l.appendChild(c);});bindCardEvents();}renderPagination(tp); }

    function bindCardEvents() {
      document.querySelectorAll('.vote-btn').forEach(b => { b.onclick = function(e) { e.stopPropagation(); e.preventDefault(); votePost(this.dataset.id, this.dataset.v==='up'?1:-1); }; });
      document.querySelectorAll('.post-content').forEach(el => { el.onclick = function(e) { if(!e.target.closest('.vote-btn')&&!e.target.closest('.save-post-btn')&&!e.target.closest('.post-action-btn')) openPostView(this.dataset.pid); }; });
      document.querySelectorAll('.comm-btn').forEach(b => { b.onclick = function(e) { e.stopPropagation(); e.preventDefault(); openPostView(this.dataset.id); }; });
      document.querySelectorAll('.save-post-btn').forEach(b => { b.onclick = function(e) { e.stopPropagation(); e.preventDefault(); toggleSave(this.dataset.id); }; });
    }

    function toggleSave(pid) { if(savedPosts.includes(pid))savedPosts=savedPosts.filter(id=>id!==pid);else savedPosts.push(pid);saveAll();applyFiltersAndRender(); }
    function renderPagination(t) { const pg=document.getElementById('pagination');if(t<=1){pg.innerHTML='';return;}let h=`<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">←</button>`;for(let i=1;i<=t;i++)h+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;h+=`<button class="page-btn" ${currentPage===t?'disabled':''} data-page="${currentPage+1}">→</button>`;pg.innerHTML=h;pg.querySelectorAll('.page-btn:not([disabled])').forEach(b=>b.onclick=()=>{currentPage=parseInt(b.dataset.page);renderPage();window.scrollTo(0,0);}); }
    async function votePost(pid,dir){const p=allPosts.find(x=>x.id===pid);if(!p)return;const uv={...(p.userVotes||{})};const cur=uv[userId]||0;let ch=0;if(cur===dir){delete uv[userId];ch=-dir;}else{if(cur)ch=-cur;uv[userId]=dir;ch+=dir;}try{await db.collection('posts').doc(pid).update({votes:(p.votes||0)+ch,userVotes:uv});}catch(e){console.error(e);}}
    function openPostView(pid){currentPostId=pid;const p=allPosts.find(x=>x.id===pid);if(!p)return;document.getElementById('postViewTitle').textContent=p.title;document.getElementById('postViewModal').classList.remove('hidden');renderPostView();}
    function renderPostView(){const p=allPosts.find(x=>x.id===currentPostId);if(!p)return;const uv=p.userVotes?.[userId]||0;const isOwner=p.authorId===userId;const c=document.getElementById('postViewContent');c.innerHTML=`<div class="post-full-view"><div style="color:#818384;font-size:0.8rem;">u/${esc(p.authorName||'аноним')} • ${ago(p.createdAt)}${p.voice?'<span class="voice-badge"><i class="fas fa-microphone"></i> голос</span>':''}${p.nsfw?'<span class="nsfw-badge">18+</span>':''}${isOwner?`<button class="delete-post-btn" id="deletePostBtn">Удалить</button>`:''}${!isOwner?`<button class="report-btn" id="reportPostBtn">🚩</button>`:''}</div><div class="post-full-body">${esc(p.body||'')}</div>${p.voice?`<div class="post-full-voice"><audio controls src="${p.voice}"></audio></div>`:''}${p.image?`<img src="${p.image}" class="post-full-image">`:''}<div style="display:flex;gap:0.5rem;margin:1rem 0;"><button class="vote-btn ${uv===1?'upvoted':''}" id="vu">▲ ${p.votes||0}</button><button class="vote-btn ${uv===-1?'downvoted':''}" id="vd">▼</button></div><div class="comments-section"><strong>Комментарии (${p.comments?p.comments.length:0})</strong>${renderComments(p.comments||[],0)}</div><div class="comment-input-row"><input type="text" class="input-field" id="ci" placeholder="Комментарий..."><button class="submit-btn" id="acb" style="width:auto;padding:0.5rem 1.5rem;">Ответить</button></div></div>`;
      document.getElementById('vu').onclick=()=>votePost(currentPostId,1);
      document.getElementById('vd').onclick=()=>votePost(currentPostId,-1);
      document.getElementById('acb').onclick=()=>{const i=document.getElementById('ci');addComment(i.value);i.value='';};
      document.getElementById('ci').onkeypress=e=>{if(e.key==='Enter')document.getElementById('acb').click();};
      const del=document.getElementById('deletePostBtn');if(del)del.onclick=async()=>{if(confirm('Удалить?')){await db.collection('posts').doc(currentPostId).delete();document.getElementById('postViewModal').classList.add('hidden');currentPostId=null;}};
      const rep=document.getElementById('reportPostBtn');if(rep)rep.onclick=async()=>{await db.collection('posts').doc(currentPostId).update({reports:firebase.firestore.FieldValue.increment(1)});alert('Жалоба отправлена');};
    }
    function renderComments(com,d){if(!com||!com.length)return'<div style="color:#818384;padding:0.5rem 0;">Пока нет</div>';return com.map((c,i)=>`<div class="comment ${d>0?'reply':''}" style="margin-left:${d*20}px;"><span class="comment-author">${esc(c.authorName||'аноним')}</span><div class="comment-text">${esc(c.text)}</div>${c.voice?`<div class="comment-voice"><audio controls src="${c.voice}"></audio></div>`:''}<small style="color:#818384;">${ago(c.createdAt)}</small><div class="comment-actions"><button class="comment-action-btn reply-btn" data-comment-id="${i}">💬 Ответить</button></div>${c.replies?renderComments(c.replies,d+1):''}</div>`).join('');}
    async function addComment(text){if(!text.trim()||!currentPostId)return;const p=allPosts.find(x=>x.id===currentPostId);if(!p)return;const nc={authorId:userId,authorName:nickname,text:text.trim(),createdAt:Date.now(),replies:[]};const comments=[...(p.comments||[]),nc];try{await db.collection('posts').doc(currentPostId).update({comments});}catch(e){console.error(e);}}
    async function createPost(title,body,image){if(!title.trim())return;const btn=document.getElementById('submitPostBtn');btn.disabled=true;btn.textContent='Публикация...';try{await db.collection('posts').add({title:title.trim(),body:body.trim(),image:image||null,voice:pendingVoice||null,authorId:userId,authorName:nickname,votes:1,userVotes:{[userId]:1},nsfw:isNSFW(title+' '+body),comments:[],createdAt:Date.now(),reports:0});closeCreateModal();}catch(e){console.error(e);}btn.disabled=false;btn.textContent='Опубликовать';}
    function ago(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'сейчас';if(m<60)return m+' мин.';const h=Math.floor(m/60);if(h<24)return h+' ч.';return Math.floor(h/24)+' дн.';}
    function esc(t){return t?t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}
    function closeCreateModal(){document.getElementById('createPostModal').classList.add('hidden');document.getElementById('postTitleInput').value='';document.getElementById('postBodyInput').value='';pendingImage=null;pendingVoice=null;document.getElementById('voicePlayerCreate').innerHTML='';document.getElementById('recordStatus').textContent='Зажмите для записи';const a=document.getElementById('imageUploadArea');a.classList.remove('has-image');a.innerHTML='<i class="fas fa-image"></i> Нажмите для фото';document.getElementById('imageInput').value='';}

    loadData();updateUI();subscribeToPosts();
    document.getElementById('savedPostsBtn').onclick=()=>{document.querySelectorAll('.sidebar-link[data-filter]').forEach(l=>l.classList.remove('active'));document.getElementById('savedPostsBtn').classList.add('active');currentFilter='saved';currentPage=1;applyFiltersAndRender();};
    document.getElementById('settingsSidebarBtn').onclick=()=>{document.getElementById('languageFilter').value=settings.language;document.getElementById('nsfwFilter').value=settings.nsfw;document.getElementById('settingsModal').classList.remove('hidden');};
    document.getElementById('closeSettingsBtn').onclick=()=>document.getElementById('settingsModal').classList.add('hidden');
    document.getElementById('saveSettingsBtn').onclick=()=>{settings.language=document.getElementById('languageFilter').value;settings.nsfw=document.getElementById('nsfwFilter').value;saveAll();document.getElementById('settingsModal').classList.add('hidden');applyFiltersAndRender();};
    document.getElementById('searchBtn').onclick=()=>{currentPage=1;applyFiltersAndRender();};
    document.getElementById('searchInput').onkeypress=e=>{if(e.key==='Enter'){currentPage=1;applyFiltersAndRender();}};
    document.querySelectorAll('.filter-tag').forEach(t=>t.onclick=()=>{document.querySelectorAll('.filter-tag').forEach(x=>x.classList.remove('active-tag'));t.classList.add('active-tag');currentTag=t.dataset.tag;currentPage=1;applyFiltersAndRender();});
    document.getElementById('openCreatePostBtn').onclick=()=>document.getElementById('createPostModal').classList.remove('hidden');
    document.getElementById('closeCreateModalBtn').onclick=closeCreateModal;
    document.getElementById('imageUploadArea').onclick=()=>document.getElementById('imageInput').click();
    document.getElementById('imageInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{pendingImage=ev.target.result;const a=document.getElementById('imageUploadArea');a.classList.add('has-image');a.innerHTML=`<img src="${pendingImage}">`;};r.readAsDataURL(f);};
    document.getElementById('submitPostBtn').onclick=()=>createPost(document.getElementById('postTitleInput').value,document.getElementById('postBodyInput').value,pendingImage);
    document.getElementById('closePostViewBtn').onclick=()=>{document.getElementById('postViewModal').classList.add('hidden');currentPostId=null;};
    document.querySelectorAll('.sort-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active-sort'));b.classList.add('active-sort');currentSort=b.dataset.sort;applyFiltersAndRender();});
    document.querySelectorAll('.sidebar-link[data-filter]').forEach(l=>l.onclick=()=>{document.querySelectorAll('.sidebar-link').forEach(x=>x.classList.remove('active'));l.classList.add('active');currentFilter=l.dataset.filter;currentPage=1;applyFiltersAndRender();});
    document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o){o.classList.add('hidden');if(o.id==='postViewModal')currentPostId=null;}}));

    const bg=document.getElementById('speedBg');
    if(bg){setInterval(()=>{const l=document.createElement('div');l.className='speed-line-bg';l.style.top=Math.random()*100+'%';l.style.width=(Math.random()*200+100)+'px';l.style.animationDuration=(Math.random()*3+2)+'s';bg.appendChild(l);setTimeout(()=>l.remove(),5000);},300);for(let i=0;i<12;i++)setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.style.width=(Math.random()*4+2)+'px';p.style.height=p.style.width;p.style.left=Math.random()*100+'%';p.style.background=Math.random()>0.5?'#00ffcc':'#ff00ff';p.style.animationDuration=(Math.random()*6+4)+'s';p.style.boxShadow=`0 0 ${Math.random()*10+5}px ${p.style.background}`;bg.appendChild(p);setTimeout(()=>p.remove(),10000);},i*400);}
  </script>
</body>
</html>
